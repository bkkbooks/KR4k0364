body:
  text: 蕭子雲晉書姚略時有賀僧者不知何人自云遊歷五郡時人號為賀五郡齋戒奉道為百姓說吉凶略死泓立僧謂泓曰宜潔掃一馬廄開屋設大柳有異馬其大非常自遠來天所送矣御覽三百五十九引蕭子雲晉史草案蕭子顯書稱晉史草亦有稱蕭景暢晉史草子雲字景陽其混稱自宜明帝以太常桓榮為五更躬式其閭親行養老之禮御覽四百七十四
